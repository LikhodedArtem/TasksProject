<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Страница 3</title>
  <link rel="stylesheet" type="text/css" href="css/third_page.css">
  <link rel="stylesheet" type="text/css" href="css/fonts.css">
  <link rel="stylesheet" type="text/css" href="css/main_styles.css">
</head>
  <body class="body">
    <header class="header">
      <div class="header-left-part">
        <button class="escape">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Стрелка влево"> <path d="M36 24H14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/> <path d="M22 16L14 24L22 32" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
        <div class="pin-files">
              <button class="pin-files-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21.44 11.05 12.25 20.24a6 6 0 1 1-8.49-8.49l9.2-9.19a4 4 0 0 1 5.65 5.66l-9.2 9.19a2 2 0 0 1-2.82-2.83l8.48-8.48"/></svg>
              </button>
            </div>
      </div>

      <div class="header-text">
        <div class="header-block first">
          <div class="for-two">
            <div class="header-cell" id="znNumber">
            <label>З / Н</label>
            <span></span>
          </div>
            <div class="header-cell" id="date">
            <label>Дата</label>
            <span></span>
          </div>
          </div>
          <div class="for-two">
            <div class="header-cell" id="win">
            <label>Vin</label>
            <span></span>
          </div>
            <div class="header-cell" id="reg">
              <label>Гос. Номер</label>
              <span></span>
            </div>
          </div>
          <div class="for-three">
            <div class="header-cell" id="model">
            <label>Модель</label>
            <span></span>
          </div>
            <div class="header-cell" id="year">
              <label>Год</label>
              <span></span>
            </div>
            <div class="header-cell" id="millage">
            <label>Пробег</label>
            <span></span>
          </div>
          </div>
      </div>
        <div class="header-block second">
          <div class="borderus">
            <div class="header-cell" id="assistant">
              <label>Ведущий специалист</label>
              <span></span>
            </div>
            <button class="pin-files">
              <div class="pin-files-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="m7 12 2 2 3.5-4"/><path d="M14.5 9H17M14.5 14H17"/></svg>
              </div>
            </button>
          </div>
          <div class="borderus">
            <div class="header-cell" id="manager">
              <label>Менеджер</label>
              <span></span>
            </div>
            <button class="pin-files">
              <div class="pin-files-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="m7 12 2 2 3.5-4"/><path d="M14.5 9H17M14.5 14H17"/></svg>
              </div>
            </button>
          </div>
        </div>
        <div class="header-buttons-wrapper">
          <div class="start-zn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"><path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393"/></svg>
          </div>

          <button class="pause-button">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="4" width="5" height="16" rx="1"/><rect x="14" y="4" width="5" height="16" rx="1"/></svg>
          </button>
          <button class="stop-button">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="5" width="14" height="14" rx="3"/></svg>
          </button>
        </div>
      <button id="took" class="active-button">Взять в работу</button>
    </header>
    <main>
      <div class="packages-panel">
        <div id="reason" class="package-wrapper">
          <button class="package">
            <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="package-name">
              <strong>Причина обращения</strong>
            </div>
            <div class="right-panel auto-close">
              <div class="checkbox">
                <div class="checkbox-inner">
                  <svg viewBox="0 0 24 24" fill="none">\n <path d="M7 12.5L10.2 15.7L17.5 8.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
              </div>
            </div>
          </button>
          <div class="package-value-wrapper">
            <div class="package-value">
              <textarea id="reasonArea" class="textarea" disabled></textarea>
            </div>
          </div>
        </div>
        <div id="recommendation" class="package-wrapper">
          <button class="package">
            <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="package-name">
              <strong>Рекомендации к последующему ремонту</strong>
            </div>
            <div class="right-panel auto-close">
              <div class="checkbox">
              <div class="checkbox-inner">
                <svg viewBox="0 0 24 24" fill="none">\n <path d="M7 12.5L10.2 15.7L17.5 8.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>\n</svg>
              </div>
            </div>
            </div>
          </button>
          <div class="package-value-wrapper">
            <div class="package-value">
              <textarea id="recArea" class="textarea" disabled></textarea>
              <div class="rec-bottom">
                <input id="recInput" type="text" placeholder="Рекомендация...">
                <button id="recApply" class="active-button">
                  Добавить
                </button>
              </div>
            </div>
          </div>
        </div>
        <div id="works" class="package-wrapper">
          <button class="package">
            <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="package-name">
              <strong>Работы</strong>
            </div>
            <div class="right-panel select-all">
              <div class="checkbox">
              <div class="checkbox-inner">
                <svg viewBox="0 0 24 24" fill="none">\n <path d="M7 12.5L10.2 15.7L17.5 8.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>\n</svg>
              </div>
            </div>
            </div>
          </button>
          <div class="package-value-wrapper">
            <div class="package-value">
              <div class="info-table works">
                <div class="table-column-name">
                  <span>Номер</span>
                </div>
                <div class="table-column-name">
                  <span>Содержание работы</span>
                </div>
                <div class="table-column-name no-break">
                  <span>Кол. р.</span>
                </div>
                <div class="table-column-name no-break">
                  <span>Н / Ч</span>
                </div>
                <div></div>

                <div class="table-content">

                </div>

              </div>
            </div>
          </div>
        </div>
        <div id="details" class="package-wrapper">
          <button class="package">
            <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="package-name">
              <strong>Запчасти</strong>
            </div>
            <div class="right-panel select-all">
              <div class="checkbox">
              <div class="checkbox-inner">
                <svg viewBox="0 0 24 24" fill="none">\n <path d="M7 12.5L10.2 15.7L17.5 8.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>\n</svg>
              </div>
            </div>
            </div>
          </button>
          <div class="package-value-wrapper">
            <div class="package-value">
              <div class="info-table details">
                <div class="table-column-name">
                  <span>Номер</span>
                </div>
                <div class="table-column-name">
                  <span>Наименование</span>
                </div>
                <div class="table-column-name">
                  <span>Код производителя</span>
                </div>
                <div class="table-column-name">
                  <span>Производитель</span>
                </div>
                <div class="table-column-name">
                  <span>Кол-во</span>
                </div>
                <div class="table-column-name">
                  <span>Ед.</span>
                </div>
                <div></div>

                <div class="table-content">

                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="js/main_script.js"></script>
  <script src="js/third_page.js"></script>
</html>
